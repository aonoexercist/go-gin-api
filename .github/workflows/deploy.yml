name: CI/CD Gin app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26
    
    - name: Install linter
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
    
    - name: Lint
      run: golangci-lint run
    
    - name: Test
      run: go test ./...
    
    - name: Build
      run: go build -v -o app
